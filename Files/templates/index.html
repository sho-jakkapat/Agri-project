<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rover Tracking Dashboard</title>

    <link rel="stylesheet" href="/static/leaflet.css">
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

    <h1>Rover Operation Dashboard</h1>

    <div class="main-container">
        <div class="map-section">
            <div id="mapid"></div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <h2>Real-time Logs</h2>
                <div style="padding: 8px 15px; background-color: #ecf0f1; border-bottom: 1px solid #bdc3c7; display: flex; justify-content: flex-end;">
                    <label style="cursor: pointer; font-size: 14px; font-weight: bold; color: #27ae60; margin: 0;">
                        <input type="checkbox" id="filterDropOnly" style="cursor: pointer; transform: scale(1.2); margin-right: 5px;"> 
                </label>
                </div>
            </div>

            <div class="table-scroll-container">
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Dist. (cm)</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/static/leaflet.js"></script>
    <script src="/static/script.js"></script>

</body>

</html>
