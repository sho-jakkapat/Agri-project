[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; 🔥 ลบการตั้งค่า PSRAM และ Flash 16MB ออกทั้งหมด
; ปล่อยให้ระบบใช้ค่าพื้นฐานที่ปลอดภัยที่สุด

build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0  ; ใช้พอร์ต UART

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

monitor_echo = yes
monitor_filters = send_on_enter

; ป้องกัน VS Code ไปกดปุ่ม BOOT ค้าง
monitor_dtr = 0
monitor_rts = 0